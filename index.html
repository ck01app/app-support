<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Support & Contact</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 40px 20px; 
        }
        header { text-align: center; margin-bottom: 40px; }
        h1 { margin-bottom: 10px; }
        .app-list { list-style: none; padding: 0; margin-bottom: 40px; }
        .app-item { 
            background: #f8f9fa; 
            padding: 15px 20px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            font-weight: bold;
            font-size: 1.1rem;
            border-left: 4px solid #007bff;
        }
        .contact-box { 
            background: #e9ecef; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
        }
        .email-link { 
            display: inline-block; 
            margin-top: 10px; 
            color: #007bff; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2rem;
        }
        .email-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <h1>Our Apps</h1>
        <p>Official support page for our mobile applications.</p>
    </header>

    <main>
        <!-- App Listing -->
        <ul class="app-list">
            <li class="app-item">📱 Lucky Ghost Leg</li>
            <li class="app-item">📱 Rolling Dices</li>
            <li class="app-item">📱 Marksix AI& Luck</li>
        </ul>

        <!-- Contact Email Box -->
        <div class="contact-box">
            <h2>Need Support?</h2>
            <p>If you have any questions, bug reports, or feature requests, please email us directly at:</p>
            <a href="mailto:ck01app@gmail.com" class="email-link">ck01app@gmail.com</a>
        </div>
    </main>

</body>
</html>
